<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South America Adventure 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f39c12, #e74c3c, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #aaa;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }
        
        .flags {
            font-size: 3rem;
            margin-bottom: 30px;
        }
        
        .dates {
            color: #f39c12;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        
        a {
            display: inline-block;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 280px;
        }
        
        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .calendar-link {
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            color: white;
        }
        
        .itinerary-link {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .footer {
            margin-top: 60px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="flags">🇵🇪 🇧🇴 🇨🇱</div>
        <h1>South America 2026</h1>
        <div class="subtitle">Adam & Emma's Adventure</div>
        <div class="dates">June 27 – August 10, 2026 • 45 Days</div>
        
        <div class="links">
            <a href="itinerary-calendar.html" class="calendar-link">📅 View Calendar</a>
            <a href="travel-itinerary.md" class="itinerary-link">📋 Full Itinerary</a>
        </div>
        
        <div class="footer">
            <p>Peru • Bolivia • Chile</p>
        </div>
    </div>
</body>
</html>
